<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="format-detection" content="telephone=no">
<title>远味食品记录卡</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #e8e0d0;
  padding: 10px;
  font-family: -apple-system, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  font-size: 15px;
  color: #a03030;
  -webkit-tap-highlight-color: transparent;
}

/* 主卡片 */
.card {
  background: #fff;
  max-width: 400px;
  margin: 0 auto;
  padding: 16px 12px 12px 12px;
}

/* 标题行 */
.head-row {
  text-align: center;
  padding-bottom: 4px;
  margin-bottom: 8px;
  position: relative;
}

.head-left {
  float: left;
  font-size: 26px;
  font-weight: 700;
  color: #a03030;
  letter-spacing: 2px;
  line-height: 1;
  margin-top: 2px;
}

.head-center {
  display: inline-block;
  font-size: 20px;
  font-weight: 700;
  color: #a03030;
  letter-spacing: 6px;
  line-height: 1;
}

.head-right {
  float: right;
  font-size: 15px;
  font-weight: 700;
  color: #a03030;
  letter-spacing: 1px;
  line-height: 1;
  margin-top: 4px;
}

.head-row::after {
  content: "";
  display: table;
  clear: both;
}

/* 信息表格 */
.info-table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 8px;
}

.info-table td {
  padding: 3px 2px;
  font-size: 14px;
  color: #a03030;
  width: 25%;
  vertical-align: bottom;
}

.info-table td input {
  border: none;
  border-bottom: 1px solid #a03030;
  background: transparent;
  font-size: 14px;
  color: #333;
  padding: 1px 2px;
  text-align: center;
  width: 100%;
  font-family: inherit;
}

.info-table td input:focus {
  outline: none;
  background: #fff5f5;
}

/* 菜品表格 */
.dish-table {
  width: 100%;
  border-collapse: collapse;
  border: 1.5px solid #a03030;
}

.dish-table th {
  border: 1px solid #a03030;
  color: #a03030;
  font-size: 14px;
  font-weight: 700;
  text-align: center;
  padding: 4px 2px;
}

.dish-table th:first-child {
  width: 16%;
  font-size: 13px;
  line-height: 1.4;
}

.dish-table th:nth-child(2) { width: 46%; }
.dish-table th:nth-child(3) { width: 16%; }
.dish-table th:nth-child(4) { width: 22%; }

.dish-table td {
  border: 1px solid #a03030;
  padding: 0;
  height: 36px;
}

.dish-table td input {
  width: 100%;
  height: 100%;
  border: none;
  background: transparent;
  font-size: 14px;
  color: #333;
  padding: 2px 4px;
  text-align: center;
  font-family: inherit;
}

.dish-table td input:focus { outline: none; background: #fff5f5; }
.dish-table td:nth-child(2) input { text-align: left; padding-left: 6px; }

.dish-table td select {
  width: 100%;
  height: 100%;
  border: none;
  background: transparent;
  font-size: 14px;
  color: #333;
  padding: 2px 4px;
  text-align: center;
  font-family: inherit;
  -webkit-appearance: menulist;
  appearance: menulist;
  text-align-last: center;
}

.dish-table td select:focus { outline: none; background: #fff5f5; }

/* 添加按钮 */
.add-btn {
  width: 100%;
  max-width: 400px;
  margin: 6px auto 0;
  padding: 8px;
  background: #fff;
  border: 1.5px dashed #a03030;
  border-radius: 4px;
  color: #a03030;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  -webkit-appearance: none;
}

.add-btn:active { background: #fff0f0; }

/* 底部行 */
.foot-row {
  max-width: 400px;
  margin: 6px auto 0;
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  font-size: 14px;
  color: #a03030;
  font-weight: 600;
}

.foot-left {
  display: flex;
  align-items: baseline;
  flex: 1;
}

.foot-left input {
  border: none;
  border-bottom: 1px solid #a03030;
  background: transparent;
  font-size: 14px;
  color: #333;
  padding: 1px 4px;
  flex: 1;
  margin-left: 4px;
  font-family: inherit;
}

.foot-left input:focus { outline: none; background: #fff5f5; }

.foot-right {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 1px;
  white-space: nowrap;
  margin-left: 12px;
}

/* 操作按钮 */
.actions {
  max-width: 400px;
  margin: 10px auto 0;
  display: flex;
  gap: 8px;
}

.btn {
  flex: 1;
  padding: 12px;
  border: 1.5px solid #a03030;
  border-radius: 4px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  text-align: center;
  font-family: inherit;
  -webkit-appearance: none;
}

.btn-new { background: #fff; color: #a03030; }
.btn-new:active { background: #fff0f0; }
.btn-shot { background: #a03030; color: #fff; }
.btn-shot:active { background: #802020; }

.tip {
  max-width: 400px;
  margin: 6px auto 0;
  text-align: center;
  font-size: 12px;
  color: #888;
  line-height: 1.5;
}

@media print {
  body { background: #fff; padding: 0; }
  .actions, .tip, .add-btn { display: none !important; }
}
</style>
</head>
<body>

<div class="card" id="card">
  <!-- 标题 -->
  <div class="head-row">
    <div class="head-left">远味</div>
    <div class="head-right" id="noTop">NO:00001</div>
    <div class="head-center">食品记录卡</div>
  </div>

  <!-- 信息 -->
  <table class="info-table">
    <tr>
      <td>台号：<input type="text" id="t1" style="width:60px;" autocomplete="off"></td>
      <td>人数：<input type="number" id="t2" style="width:50px;" min="1" autocomplete="off"></td>
      <td>日期：<input type="text" id="t3" style="width:80px;" autocomplete="off"></td>
      <td>经手人：<input type="text" id="t4" style="width:60px;" autocomplete="off"></td>
    </tr>
    <tr>
      <td>顾客：<input type="text" id="t5" style="width:60px;" autocomplete="off"></td>
      <td>茶位：<input type="number" id="t6" style="width:50px;" min="1" autocomplete="off"></td>
      <td>时间：<input type="text" id="t7" style="width:80px;" autocomplete="off"></td>
      <td>落单时间：<input type="text" id="t8" style="width:60px;" autocomplete="off"></td>
    </tr>
  </table>

  <!-- 菜品表格 -->
  <table class="dish-table" id="dishTable">
    <thead>
      <tr>
        <th>大小<br>大/中/小</th>
        <th>名称</th>
        <th>数量</th>
        <th>烹饪方法</th>
      </tr>
    </thead>
    <tbody id="dishBody"></tbody>
  </table>
</div>

<button class="add-btn" onclick="addRow()" id="addBtn">+ 添加菜品行</button>

<!-- 底部 -->
<div class="foot-row" id="footRow">
  <div class="foot-left">顾客意见：<input type="text" id="note" style="width:100%;" autocomplete="off"></div>
  <div class="foot-right" id="noBottom">NO:00001</div>
</div>

<!-- 按钮 -->
<div class="actions" id="actions">
  <button class="btn btn-new" onclick="newOrder()">📝 新订单</button>
  <button class="btn btn-shot" onclick="takeShot()">📸 截屏发后厨</button>
</div>

<div class="tip" id="tip">填完点击"截屏发后厨"→按钮自动隐藏→手机截屏→发后厨微信群</div>

<script>
function genNo() {
  var now = new Date();
  var d = String(now.getDate()).padStart(2, '0');
  var r = String(Math.floor(Math.random() * 900) + 100);
  return 'NO:' + d + r;
}

function fillTime() {
  var now = new Date();
  var ds = (now.getMonth() + 1) + '月' + now.getDate() + '日';
  var ts = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
  document.getElementById('t3').value = ds;
  document.getElementById('t7').value = ts;
}

function addRow() {
  var tbody = document.getElementById('dishBody');
  var tr = document.createElement('tr');
  var now = new Date();
  var ts = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
  tr.innerHTML = '<td><select><option value=""></option><option value="大">大</option><option value="中">中</option><option value="小">小</option></select></td><td><input type="text" placeholder="" autocomplete="off"></td><td><input type="number" placeholder="" min="1" autocomplete="off"></td><td><input type="text" placeholder="" autocomplete="off"></td>';
  tbody.appendChild(tr);
}

function init() {
  document.getElementById('dishBody').innerHTML = '';
  for (var i = 0; i < 5; i++) addRow();
}

function newOrder() {
  if (!confirm('确定要新建订单吗？')) return;
  var inputs = document.querySelectorAll('#card input, .foot-left input');
  for (var i = 0; i < inputs.length; i++) inputs[i].value = '';
  var no = genNo();
  document.getElementById('noTop').textContent = no;
  document.getElementById('noBottom').textContent = no;
  fillTime();
  init();
  window.scrollTo(0, 0);
}

function takeShot() {
  document.getElementById('actions').style.display = 'none';
  document.getElementById('tip').style.display = 'none';
  document.getElementById('addBtn').style.display = 'none';
  alert('现在请截屏（电源键+音量下键），然后发给后厨。\n\n点击确定恢复按钮。');
  document.getElementById('actions').style.display = 'flex';
  document.getElementById('tip').style.display = 'block';
  document.getElementById('addBtn').style.display = 'block';
}

var no = genNo();
document.getElementById('noTop').textContent = no;
document.getElementById('noBottom').textContent = no;
fillTime();
init();
</script>

</body>
</html>
